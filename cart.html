{% extends 'base.html' %}

{% block title %}Cart - The Arcadia Archives{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Shopping Bag</h1>
        <p>Your curated selections from The Arcadia Archives</p>
    </div>
</section>

<section class="cart-section">
    <div class="container">
        <div class="cart-container" id="cartContainer">
            <div class="cart-items" id="cartItems">
                <!-- Cart items loaded by JavaScript -->
            </div>
            <div class="cart-summary" id="cartSummary">
                <!-- Cart summary loaded by JavaScript -->
            </div>
        </div>
    </div>
</section>
{% endblock %}
