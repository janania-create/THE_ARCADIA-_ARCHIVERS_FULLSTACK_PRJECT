{% extends 'base.html' %}

{% block title %}Profile - The Arcadia Archives{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>My Profile</h1>
        <p>Welcome to your Arcadia Archives account</p>
    </div>
</section>

<section class="profile-section">
    <div class="container">
        <div class="profile-container">
            <div class="profile-sidebar">
                <div class="profile-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h3 id="profileName">Guest User</h3>
                <p id="profileEmail">guest@arcadiaarchives.com</p>
                <button class="btn-secondary" id="logoutBtn">Logout</button>
            </div>
            <div class="profile-content">
                <div class="profile-card">
                    <h3>Order History</h3>
                    <div id="orderHistory">
                        <p class="empty-message">No orders yet. Start shopping!</p>
                    </div>
                </div>
                <div class="profile-card">
                    <h3>Wishlist</h3>
                    <div id="wishlist">
                        <p class="empty-message">Your wishlist is empty.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
